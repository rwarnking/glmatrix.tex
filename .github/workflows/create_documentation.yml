#########################################
#########################################
## Create Documentation GitHub Actions ##
#########################################
#########################################
name: Create Documentation

#################################
# Start the job on push to main #
#################################
on:
  workflow_run:
    workflows: [Run Unit Tests]
    types:
      - completed
  # push:
  #   branches:
  #     - main

# Set the Jobs
jobs:
  ##############
  # Create dtx #
  ##############
  create_dtx:
    # Name the Job
    name: Create .dtx file
    # Set the agent to run on
    runs-on: ubuntu-latest

    # Load all steps
    steps:
      # Checkout the code base
      - name: Checkout repo content
        uses: actions/checkout@v6
      # Setup python
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Checkout repo of tex to dtx converter
        uses: actions/checkout@v6
        with:
          repository: rwarnking/tex-to-dtx-converter
          path: tex-to-dtx-converter
      # Install dependencies
      - name: Install dependencies
        run: |
          if [ -f tex-to-dtx-converter/requirements.txt ]; then pip install -r tex-to-dtx-converter/requirements.txt; fi
      # Execute python script
      - name: execute py script
        run: |
          python -u tex-to-dtx-converter/src/main.py --resource-dir "/home/runner/work/glmatrix.tex/glmatrix.tex/resources" --target-dir "/home/runner/work/glmatrix.tex/glmatrix.tex"
      - name : show files
        run : "ls -R"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-dtx-file
          path: glmatrix.dtx
          retention-days: 1

  ###############
  # Compile dtx #
  ###############
  build_latex:
    # Name the Job
    name: Compile PDF
    # Set the agent to run on
    runs-on: ubuntu-latest
    # Requires
    needs: create_dtx

    permissions:
      contents: write
      actions: read

    ##################
    # Load all steps #
    ##################
    steps:
      ##########################
      # Checkout the code base #
      ##########################
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Download artifact (dtx file)
        uses: actions/download-artifact@v4
        with:
          name: shared-dtx-file
      - name: Download artifact (testing log)
        uses: actions/download-artifact@v8
        with:
          name: unit-tests-file
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
      ####################
      # Run the compiler #
      ####################
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: "glmatrix.dtx"
          glob_root_file: true
      - name : Show files
        run : "ls -R"
      ###################
      # Push dtx commit #
      ###################
      - name: Auto commit created LaTeX files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Automated commit: Add created LaTeX files"
          file_pattern: '*.dtx *.pdf *.ins *.sty'
