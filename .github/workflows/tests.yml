###################################
###################################
## Run Unit Tests GitHub Actions ##
###################################
###################################
name: Run Unit Tests

# Allow to call this workflow by other workflows
on:
  workflow_call:

# Set the Jobs
jobs:
  ##################
  # Run Unit Tests #
  ##################
  run_unit_tests:
    # Name the Job
    name: Compile Document containing the Unit Tests
    # Set the agent to run on
    runs-on: ubuntu-latest

    ##################
    # Load all steps #
    ##################
    steps:
      ##########################
      # Checkout the code base #
      ##########################
      - name: Set up Git repository
        uses: actions/checkout@v6
      ####################
      # Run the compiler #
      ####################
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: "tests/function_unit_tests.tex"
          glob_root_file: true
      ####################
      # Save testing log #
      ####################
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-file
          path: function_unit_tests.pdf
          retention-days: 1
